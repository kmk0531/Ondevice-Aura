syntax = "proto3";

package aura;

enum ErrorCode {
  NONE = 0;
  GRPC_TIMEOUT = 1;
  OLLAMA_TIMEOUT = 2;
  OLLAMA_ERROR = 3;
  REQUEST_ID_MISMATCH = 4;
  UNKNOWN_ERROR = 5;
}

message EmotionCandidate {
  string source = 1;
  string emotion_label = 2;
  float valence = 3;
  float arousal = 4;
  float confidence = 5;
  string text = 6;           // 음성/텍스트 원본
}

message FusedEmotionState {
  string primary_emotion = 1;
  float confidence = 2;
  float valence = 3;
  float arousal = 4;
  string description = 5;    // Alignment 이상 감지 메모
}

message ContextualPrompt {
  string session_id = 1;
  string request_id = 2;
  string final_prompt = 3;
  float valence = 4;
  float arousal = 5;
  int64 timestamp = 6;
  repeated EmotionCandidate candidates = 7;
  FusedEmotionState fused_emotion = 8;
  string user_text = 9;
}

message EmpathyResponse {
  string session_id = 1;
  string request_id = 2;
  string text = 3;
  float response_time = 4;
  string strategy = 5;
  ErrorCode error_code = 6;
  string error_message = 7;
}

message TTSRequest {
  string session_id = 1;
  string text = 2;
  float valence = 3;
  float arousal = 4;
  string strategy = 5;
}

// ==========================================
// Services
// ==========================================

service AuraService {
  rpc GenerateEmpathy (ContextualPrompt) returns (EmpathyResponse);
}

service AuraPerception {
  rpc SendFacePerception (EmotionCandidate) returns (EmpathyResponse);
  rpc SendVoicePerception (EmotionCandidate) returns (EmpathyResponse);
}

service AuraTTS {
  rpc SendDialogue (TTSRequest) returns (EmpathyResponse);
}
